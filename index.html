   <span class="tag cat">${esc(r.task)}</span> <span class="muted">· ${esc(r.duration_in_sec)}s · ${r.questions?.length||0} Q/A</span>
   <div class="q">Multi-turn conversational QA</div>
   <div class="dlg">${dlg}</div></div></div>`;
}
function proactive(r){
  const turns=[];const dl=r.dialog||[];const last=dl.length?dl[dl.length-1]:[];
  last.forEach(t=>{let txt=t.text,badge='';
    if(txt.startsWith('$interrupt$')){badge=`<span class="tag badge-int">interrupt</span> `;txt=txt.slice(11);}
    else if(txt.startsWith('$silent$')){badge=`<span class="tag badge-sil">silent</span> `;txt=txt.slice(8)||'(no action)';}
    const c=t.role==='assistant'?'assist':'user';
    turns.push(`<div class="turn ${c}">${t.role==='assistant'?badge:`<span class="who">user</span>`}${esc(txt)}</div>`);});
  return `<div class="card">${vid(r._video)}<div class="body">
   <span class="tag cat">${esc(r.domain)}</span> <span class="muted">· ${esc(r.duration_in_sec)}s</span>
   <div class="q">${esc(r.query)}</div>
   <div class="kv"><b>Task:</b> ${esc(r.task)}</div>
   <div class="kv"><b>Proactive assistant stream</b> (interrupt = speak up, silent = stay quiet):</div>
   <div class="dlg">${turns.join('')}</div></div></div>`;
}
/* ---- Qualcomm ---- */
function qccard(r){
  const cls=t=>t==='instruction'?'instruction':(t.includes('success')?'success':'mistake');
  const ev=r.events.map(e=>`<div class="ev ${cls(e.type)}"><span class="ts">${e.t.toFixed(1)}s</span>
     <div><span class="evtype">${esc(e.type)}</span><br>${esc(e.text)}</div></div>`).join('');
  return `<div class="card">${vid(r._video)}<div class="body">
   <span class="tag cat">${esc(r.activity_name)}</span> <span class="muted">· video_id ${esc(r.video_id)} (CaptainCook4D)</span>
   <div class="q">Live timed instruction + feedback stream</div>
   <div class="kv"><b>Plan:</b> ${esc((r.remaining_plan||'').slice(0,160))}…</div>
   <div class="stream">${ev}</div></div></div>`;
}
/* render */
document.getElementById('pane-wb').innerHTML=`
 <div class="intro"><h2>🕶️ Meta Wearable-AI <span class="pill" style="background:#1b2a3a;color:#4493f8">ECCV 2026</span></h2>
 <p>Egocentric (head-mounted camera) benchmark for wearable AI assistants. 2,100 face-blurred, audio-stripped 1080p videos across 3 tasks, 700 validation samples each.</p>
 <p><b>EgoLongQA</b>: long-video multiple-choice QA · <b>EgoConv</b>: multi-turn conversational QA · <b>EgoProactive</b>: decide when to proactively interrupt vs stay silent on a video stream.</p></div>
 <h3>EgoLongQA — long-video multiple choice</h3><div class="grid">${D.wearable.egolongqa.map(longqa).join('')}</div>
 <h3 style="margin-top:26px">EgoConv — multi-turn conversation</h3><div class="grid">${D.wearable.egoconv.map(conv).join('')}</div>
 <h3 style="margin-top:26px">EgoProactive — proactive assistance</h3><div class="grid">${D.wearable.egoproactive.map(proactive).join('')}</div>`;

const sz=D.qc_sizes;
document.getElementById('pane-qc').innerHTML=`
 <div class="intro"><h2>🍳 Qualcomm Interactive Cooking <span class="pill" style="background:#241a10;color:#d29922">NeurIPS 2025</span></h2>
 <p>Built on <b>CaptainCook4D</b> with added mistake annotations. The HF dataset is <b>annotation-only</b> (timed instructions + feedback + mistake alerts); videos come from CaptainCook4D (shown here at 360p).</p>
 <p>Two configs · splits — <code>main</code>: ${sz['main/train']}/${sz['main/validation']}/${sz['main/test']} (train/val/test) · <code>advanced_planning</code>: ${sz['advanced_planning/train']}/${sz['advanced_planning/validation']}/${sz['advanced_planning/test']}.</p>
 <p>Each row is a step-by-step coaching trace: <span class="tag instruction" style="border-left:3px solid var(--blue);padding-left:6px">instruction</span> what to do next · <span class="tag success" style="border-left:3px solid var(--green);padding-left:6px">success</span> step done right · <span class="tag mistake" style="border-left:3px solid var(--red);padding-left:6px">mistake</span> error alert, all timestamped to the video.</p></div>
 <h3>main config</h3><div class="grid">${D.qualcomm.main.map(qccard).join('')}</div>
 <h3 style="margin-top:26px">advanced_planning config</h3><div class="grid">${D.qualcomm.advanced_planning.map(qccard).join('')}</div>`;

const tabs=[['pane-wb','🕶️ Wearable-AI (Meta)'],['pane-qc','🍳 Qualcomm Cooking']];
const tc=document.getElementById('tabs');
tabs.forEach(([id,label],i)=>{const b=document.createElement('div');b.className='tab'+(i===0?' active':'');
 b.textContent=label;b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
 document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));b.classList.add('active');
